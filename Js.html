<script>
    let globalDataKaryawan = []; 
    let dataTableInstance = null; 
    let dataTableMonitoring = null; 
    let statusKacamata = { lensaTersedia: true, frameTersedia: true };
    let myCharts = []; 

    $(document).ready(function() { 
        checkAuth(); 
    });

    function checkAuth() { 
        const isLoggedIn = sessionStorage.getItem('kobe_logged_in'); 
        if(isLoggedIn === 'true') { showApp(); } else { showLogin(); } 
    }

    function showLogin() { 
        $('#app-wrapper').hide(); 
        $('#loginForm').trigger('reset'); 
        $('#login-wrapper').fadeIn(500); 
    }

function showApp() { 
    $('#login-wrapper').hide(); 
    $('#app-wrapper').fadeIn(500); 
    navigateTo('Dashboard'); 
    loadKaryawanData(); 
    
    // TAMBAHKAN INI: Sinkronkan pilihan PT dengan database
    initPerusahaanDropdowns(); 
    
    $('#toggleSidebar').off('click').on('click', function() { $('.sidebar').toggleClass('show'); }); 
}

    function processLogin(e) { 
        e.preventDefault(); 
        Swal.fire({ title: 'Memeriksa Akses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        google.script.run.withSuccessHandler(resJSON => { 
            const res = JSON.parse(resJSON); 
            if(res.status === 'success') { 
                sessionStorage.setItem('kobe_logged_in', 'true'); 
                Swal.fire({ icon: 'success', title: 'Berhasil', timer: 1000, showConfirmButton: false }); 
                setTimeout(() => showApp(), 1000); 
            } else { 
                Swal.fire('Gagal', res.message, 'error'); 
            } 
        }).verifyLogin($('#login-username').val(), $('#login-password').val()); 
    }

    function logout() { 
        sessionStorage.removeItem('kobe_logged_in'); 
        checkAuth(); 
    }

    function navigateTo(pageName) {
        $('.page-view').hide(); 
        $('#view-' + pageName).fadeIn(300);
        
        // Sesuaikan Judul Halaman
        let title = pageName;
        if(pageName === 'Karyawan') title = 'Data Karyawan';
        else if(pageName === 'MonitoringKlaim') title = 'Monitoring & Approval Klaim';
        
        // TAMBAHAN UNTUK MENU ABSENSI:
        else if(pageName === 'edit-absensi') title = 'Edit / Tambah Absensi';
        else if(pageName === 'kelola-libur') {
        title = 'Kelola Hari Libur';
        loadDataLibur(); // <-- Panggil data otomatis saat menu dibuka
        }
        else if(pageName === 'rekap-all') title = 'Rekapitulasi Absensi (Semua)';
        else if(pageName === 'rekap-summary') title = 'Summary Absensi Per Karyawan';
        else if(pageName === 'laporan-absensi') title = 'Cetak Laporan Absensi';
        else if(pageName === 'variabel-gaji') title = 'Export Variabel Gaji';

        $('#page-title').text(title); 
        if ($(window).width() < 768) $('.sidebar').removeClass('show');
    }

    function filterTable(kategori) {
        navigateTo('Karyawan'); 
        let dataFilter = globalDataKaryawan;
        
        if (kategori === 'Tetap') {
            dataFilter = globalDataKaryawan.filter(k => k.Status && k.Status.toLowerCase().includes('tetap'));
        } else if (kategori === 'Kontrak') {
            dataFilter = globalDataKaryawan.filter(k => k.Status && k.Status.toLowerCase().includes('kontrak'));
        } else if (kategori === 'Mekanik Service') {
            dataFilter = globalDataKaryawan.filter(k => k.Section && k.Section.toLowerCase().includes('service'));
        } else if (kategori === 'Mekanik Refurbish') {
            dataFilter = globalDataKaryawan.filter(k => k.Section && k.Section.toLowerCase().includes('refurbish'));
        } else if (kategori === 'FMC') {
            dataFilter = globalDataKaryawan.filter(k => k.Section && k.Section.toLowerCase().includes('fmc'));
        } else if (kategori === 'Satelit') {
            dataFilter = globalDataKaryawan.filter(k => k.Section && k.Section.toLowerCase().includes('satelit'));
        }
        
        $('#page-title').text('Data Karyawan: ' + kategori); 
        renderTableCustom(dataFilter);
    }

    // =========================================================
    // MODUL DASHBOARD & GRAFIK (TERMASUK PERHITUNGAN CABANG)
    // =========================================================
    function renderDashboardStats() { 
        // 1. Angka Kotak Utama
        $('#stat-total').text(globalDataKaryawan.length); 
        $('#stat-tetap').text(globalDataKaryawan.filter(k => k.Status && k.Status.toLowerCase().includes('tetap')).length); 
        $('#stat-kontrak').text(globalDataKaryawan.filter(k => k.Status && k.Status.toLowerCase().includes('kontrak')).length); 
        $('#stat-service').text(globalDataKaryawan.filter(k => k.Section && k.Section.toLowerCase().includes('service')).length); 
        $('#stat-rental').text(globalDataKaryawan.filter(k => k.Section && (k.Section.toLowerCase().includes('fmc') || k.Section.toLowerCase().includes('satelit'))).length); 
        $('#stat-refurbish').text(globalDataKaryawan.filter(k => k.Section && k.Section.toLowerCase().includes('refurbish')).length);

        // 2. Angka Kotak Lemah Abang (Umum)
        let dataLA = globalDataKaryawan.filter(k => {
            let loc = (k.Lokasi || k.Wilayah || k.Penempatan || k.Area || k.Cabang || '').toLowerCase();
            return loc.includes('lemah abang') || loc.includes('la');
        });
        $('#stat-la-total').text(dataLA.length);
        $('#stat-la-tetap').text(dataLA.filter(k => k.Status && k.Status.toLowerCase().includes('tetap')).length);
        $('#stat-la-kontrak').text(dataLA.filter(k => k.Status && k.Status.toLowerCase().includes('kontrak')).length);

        // 3. OLAH DATA MEKANIK PER CABANG
        const listCabang = [
            { id: 'la', keys: ['lemah abang', 'la'] },
            { id: 'surabaya', keys: ['surabaya'] },
            { id: 'semarang', keys: ['semarang'] },
            { id: 'medan', keys: ['medan'] },
            { id: 'cilegon', keys: ['cilegon'] },
            { id: 'makasar', keys: ['makasar', 'makassar'] }
        ];

        listCabang.forEach(cabang => {
            // Filter karyawan di cabang tersebut
            let pKaryawanCabang = globalDataKaryawan.filter(k => {
                let loc = (k.Lokasi || k.Wilayah || k.Penempatan || k.Area || k.Cabang || '').toLowerCase();
                return cabang.keys.some(key => loc.includes(key));
            });

            // Hitung mekanik di dalam cabang tersebut
            let cService = pKaryawanCabang.filter(k => k.Section && k.Section.toLowerCase().includes('service')).length;
            let cRental = pKaryawanCabang.filter(k => k.Section && (k.Section.toLowerCase().includes('fmc') || k.Section.toLowerCase().includes('satelit'))).length;
            let cRefurbish = pKaryawanCabang.filter(k => k.Section && k.Section.toLowerCase().includes('refurbish')).length;

            // Cetak ke HTML
            $(`#stat-mek-${cabang.id}-service`).text(cService);
            $(`#stat-mek-${cabang.id}-rental`).text(cRental);
            $(`#stat-mek-${cabang.id}-refurbish`).text(cRefurbish);
        });

        // 4. Olah Data Grafik Analitik
        let countDept = {};
        let countGender = { 'Pria': 0, 'Wanita': 0 };
        let countGen = { 'Gen Z (>1996)': 0, 'Milenial (1981-1996)': 0, 'Gen X (<1981)': 0 };

        globalDataKaryawan.forEach(k => {
            let dept = k.Departement || 'Lain-lain';
            if (dept.trim() === '') dept = 'Lain-lain';
            countDept[dept] = (countDept[dept] || 0) + 1;

            let jk = (k.Jenis_Kelamin || k.Gender || k.JK || k.Kelamin || '').toLowerCase();
            if(jk.startsWith('l') || jk.includes('pria') || jk === 'm') countGender['Pria']++;
            else if(jk.startsWith('p') || jk.includes('wanita') || jk === 'f' || jk.includes('perempuan')) countGender['Wanita']++;

            let tgl = k.Tanggal_Lahir || k.Tgl_Lahir || k.Lahir || k.Tahun_Lahir;
            let tahunLahir = 0;
            if (tgl) { tahunLahir = new Date(tgl).getFullYear(); } 
            else if (k.Usia) { tahunLahir = new Date().getFullYear() - parseInt(k.Usia); }

            if (tahunLahir > 1996) countGen['Gen Z (>1996)']++;
            else if (tahunLahir >= 1981 && tahunLahir <= 1996) countGen['Milenial (1981-1996)']++;
            else if (tahunLahir > 0 && tahunLahir < 1981) countGen['Gen X (<1981)']++;
        });

        drawCharts(countGender, countDept, countGen);
    }

    function drawCharts(genderData, deptData, genData) {
        myCharts.forEach(c => c.destroy());
        myCharts = [];

        const colors = ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#0dcaf0', '#6f42c1', '#fd7e14', '#20c997', '#e83e8c'];

        const ctxGender = document.getElementById('genderChart').getContext('2d');
        myCharts.push(new Chart(ctxGender, {
            type: 'pie',
            data: { labels: Object.keys(genderData), datasets: [{ data: Object.values(genderData), backgroundColor: ['#0d6efd', '#dc3545'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        }));

        const ctxDept = document.getElementById('deptChart').getContext('2d');
        myCharts.push(new Chart(ctxDept, {
            type: 'doughnut',
            data: { labels: Object.keys(deptData), datasets: [{ data: Object.values(deptData), backgroundColor: colors }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } 
        }));

        const ctxGen = document.getElementById('genChart').getContext('2d');
        myCharts.push(new Chart(ctxGen, {
            type: 'bar',
            data: { labels: Object.keys(genData), datasets: [{ label: 'Jumlah', data: Object.values(genData), backgroundColor: '#198754', borderRadius: 5 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
        }));
    }

    // =========================================================
    // MODUL KLAIM PEMERIKSAAN KEHAMILAN
    // =========================================================
    function openKlaimForm(jenisKlaim) { 
        $('#mainFormKlaim')[0].reset(); 
        $('#area-data-klaim').hide(); 
        $('#area-input-pengajuan').show(); 
        $('#klaimTitle').html(`<i class="fa-solid fa-file-medical me-2"></i> Form Klaim: ${jenisKlaim}`); 
        $('#formKlaimModal').modal('show'); 
    }

    function cekDataKaryawanKlaim() { 
        const nrpp = $('#klaim-nrpp').val().trim(); 
        if(!nrpp) return; 
        Swal.fire({ title: 'Mengecek Saldo...', didOpen: () => Swal.showLoading() }); 
        google.script.run.withSuccessHandler(resJSON => { 
            const d = JSON.parse(resJSON).data; 
            $('#klaim-nama').val(d.Nama); 
            $('#klaim-dept').val(d.Departement); 
            $('#klaim-golongan').val(d.Golongan); 
            let m = 0;
            if(d.Golongan.includes('VII')) m = 6000000; 
            else if(d.Golongan.includes('VI')) m = 5000000; 
            else if(d.Golongan.includes('V')) m = 4000000; 
            else if(d.Golongan.includes('IV')) m = 3000000; 
            else m = 2000000; 
            let s = m - d.TotalTerpakai; 
            if (s < 0) s = 0;
            $('#klaim-plafon-text').val("Rp " + m.toLocaleString('id-ID')); 
            $('#klaim-sisa-text').val("Rp " + s.toLocaleString('id-ID')); 
            $('#klaim-sisa-value').val(s); 
            $('#area-data-klaim').fadeIn(); 
            if (s <= 0) { 
                Swal.fire({ icon: 'error', title: 'Saldo Habis' }); 
                $('#area-input-pengajuan').hide(); 
            } else { 
                $('#area-input-pengajuan').show(); 
                Swal.close(); 
            } 
        }).getKaryawanForKlaim(nrpp); 
    }

    function hitungPlafonDisetujui() { 
        const sisa = parseInt($('#klaim-sisa-value').val()) || 0; 
        const kwitansi = parseInt($('#klaim-kwitansi').val()) || 0; 
        if (kwitansi > sisa) { 
            $('#klaim-disetujui').val(kwitansi).addClass('bg-danger').removeClass('bg-success'); 
        } else { 
            $('#klaim-disetujui').val(kwitansi).removeClass('bg-danger').addClass('bg-success'); 
        } 
    }

    function processSubmitKlaim(e) { 
        e.preventDefault(); 
        const sisa = parseInt($('#klaim-sisa-value').val()) || 0; 
        const kwitansi = parseInt($('#klaim-kwitansi').val()) || 0; 
        if (kwitansi > sisa) return Swal.fire('Ditolak', 'Melebihi plafon', 'error'); 
        
        const formData = {
            NRPP: $('#klaim-nrpp').val(), 
            Nama: $('#klaim-nama').val(), 
            Departement: $('#klaim-dept').val(), 
            Tanggal_Pengajuan: $('#klaim-tanggal').val(), 
            Nominal_Kwitansi: kwitansi, 
            Nominal_Disetujui: kwitansi, 
            Keterangan_Medis: $('#klaim-keterangan').val()
        };
        Swal.fire({ title: 'Menyimpan Klaim...', didOpen: () => Swal.showLoading() });
        google.script.run.withSuccessHandler(r => { 
            Swal.fire('Sukses', 'Klaim disimpan', 'success'); 
            $('#formKlaimModal').modal('hide'); 
        }).submitKlaim(formData); 
    }

    // =========================================================
    // MODUL KLAIM KACAMATA
    // =========================================================
    function openKacamataForm() { 
        $('#mainFormKacamata')[0].reset(); 
        $('#area-data-kcm').hide(); 
        $('#box-input-lensa').hide();
        $('#box-input-frame').hide();
        $('#formKlaimKacamata').modal('show'); 
    }

    function cekDataKaryawanKacamata() { 
        const nrpp = $('#kcm-nrpp').val().trim(); 
        if(!nrpp) return; 
        Swal.fire({title: 'Mengecek...', didOpen: () => Swal.showLoading()}); 
        google.script.run.withSuccessHandler(resJSON => { 
            const res = JSON.parse(resJSON);
            const d = res.data; 
            $('#kcm-nama').text(d.Nama); 
            $('#kcm-dept').text(d.Departement); 
            $('#kcm-gol').text(d.Golongan); 
            statusKacamata.lensaTersedia = d.LensaTersedia; 
            statusKacamata.frameTersedia = d.FrameTersedia; 
            
            if(d.LensaTersedia) {
                $('#kcm-status-lensa').text(d.InfoLensa).removeClass('text-danger').addClass('text-success');
            } else {
                $('#kcm-status-lensa').text(d.InfoLensa).removeClass('text-success').addClass('text-danger');
            }
            if(d.FrameTersedia) {
                $('#kcm-status-frame').text(d.InfoFrame).removeClass('text-danger').addClass('text-success');
            } else {
                $('#kcm-status-frame').text(d.InfoFrame).removeClass('text-success').addClass('text-danger');
            }
            $('#area-data-kcm').fadeIn(); 
            Swal.close(); 
        }).getKaryawanForKlaimKacamata(nrpp); 
    }

    function gantiJenisKacamata() { 
        const j = $('#kcm-jenis').val(); 
        $('#box-input-lensa').toggle(j.includes("Lensa")); 
        $('#box-input-frame').toggle(j.includes("Frame")); 
    }

    function hitungKacamata() { 
        const l = parseInt($('#kcm-kwi-lensa').val()) || 0; 
        const f = parseInt($('#kcm-kwi-frame').val()) || 0; 
        $('#kcm-setuju-lensa').val(Math.min(l, 350000)); 
        $('#kcm-setuju-frame').val(Math.min(f, 500000)); 
    }

    function processSubmitKacamata(e) { 
        e.preventDefault(); 
        const j = $('#kcm-jenis').val(); 
        const namaPasien = $('#kcm-pasien').val();
        
        if(j.includes("Lensa") && !statusKacamata.lensaTersedia) return Swal.fire('Tolak','Lensa belum 1 thn','error'); 
        if(j.includes("Frame") && !statusKacamata.frameTersedia) return Swal.fire('Tolak','Frame belum 2 thn','error');
        
        const submitItems = []; 
        const base = { 
            NRPP: $('#kcm-nrpp').val(), 
            Nama: $('#kcm-nama').text(), 
            Departement: $('#kcm-dept').text(), 
            Tanggal_Pengajuan: $('#kcm-tanggal').val(), 
            Keterangan_Medis: "Pasien: " + namaPasien + " | Ket: " + $('#kcm-keterangan').val() 
        }; 
        
        if(j.includes("Lensa")) {
            submitItems.push({...base, Jenis_Klaim: "Lensa Saja", Nominal_Kwitansi: $('#kcm-kwi-lensa').val(), Nominal_Disetujui: $('#kcm-setuju-lensa').val()});
        }
        if(j.includes("Frame")) {
            submitItems.push({...base, Jenis_Klaim: "Frame Saja", Nominal_Kwitansi: $('#kcm-kwi-frame').val(), Nominal_Disetujui: $('#kcm-setuju-frame').val()});
        }
        
        Swal.fire({ title: 'Menyimpan Klaim...', didOpen: () => Swal.showLoading() });
        google.script.run.withSuccessHandler(r => { 
            Swal.fire('Sukses', 'Klaim kacamata disimpan', 'success'); 
            $('#formKlaimKacamata').modal('hide'); 
        }).submitKlaimKacamata(submitItems); 
    }

    // =========================================================

        $('#mainFormKlaimPersalinan')[0].reset(); 
        $('#area-data-persalinan').hide(); 
        $('#formKlaimPersalinanModal').modal('show'); 
    }

    function cekDataKaryawanPersalinan() { 
        const nrpp = $('#pers-nrpp').val(); 
        Swal.fire({title: 'Mengecek...', didOpen: () => Swal.showLoading()});
        google.script.run.withSuccessHandler(resJSON => { 
            const d = JSON.parse(resJSON).data; 
            $('#pers-nama').val(d.Nama); 
            $('#pers-dept').val(d.Departement);

            $('#area-data-persalinan').fadeIn(); 
            Swal.close();
        }).getKaryawanForKlaimPersalinan(nrpp); 
    }

    function hitungPersalinan() { 
        const j = $('#pers-jenis').val(); 
        const g = $('#pers-golongan').val().toUpperCase(); 
        let p = 3000000; 
        if(j === "Normal") { 
            if(g.includes('VII')) p = 12000000; 
            else if(g.includes('VI')) p = 9000000; 
            else if(g.includes('V')) p = 6000000; 
            else if(g.includes('IV')) p = 4000000; 
        } else if(j === "Cesar") { 
            if(g.includes('VII')) p = 24000000; 
            else if(g.includes('VI')) p = 16000000; 
            else if(g.includes('V')) p = 12000000; 
            else if(g.includes('IV')) p = 8000000; 
            else p = 6000000; 
        } else if(j === "Komplikasi") { 
            if(g.includes('VII') || g.includes('VI')) p = 0; 
            else if(g.includes('V')) p = 5100000; 
            else if(g.includes('IV')) p = 3400000; 
            else p = 2550000; 
        } 
        $('#pers-plafon-text').val(p === 0 ? "TIDAK TERCOVER" : "Rp " + p.toLocaleString('id-ID')); 
        $('#pers-plafon-value').val(p); 
        const k = parseInt($('#pers-kwitansi').val()) || 0; 
        $('#pers-disetujui').val(Math.min(k, p)); 
        $('#pers-pribadi-text').val("Rp " + Math.max(0, k - p).toLocaleString('id-ID')); 
    }

    function processSubmitKlaimPersalinan(e) { 
        e.preventDefault(); 
        if($('#pers-plafon-value').val() == 0) return Swal.fire('Ditolak', 'Tidak tercover', 'error'); 
        
        const formData = { 
            NRPP: $('#pers-nrpp').val(), 
            Nama: $('#pers-nama').val(), 
            Departement: $('#pers-dept').val(), 
            Tanggal_Pengajuan: $('#pers-tanggal').val(), 
            Jenis_Persalinan: $('#pers-jenis').val(), 
            Nominal_Kwitansi: $('#pers-kwitansi').val(), 
            Nominal_Disetujui: $('#pers-disetujui').val(), 
            Keterangan_Medis: $('#pers-keterangan').val() 
        }; 
        Swal.fire({ title: 'Menyimpan Klaim...', didOpen: () => Swal.showLoading() });
        google.script.run.withSuccessHandler(r => { 
            Swal.fire('Sukses', 'Klaim persalinan disimpan', 'success'); 
            $('#formKlaimPersalinanModal').modal('hide'); 
        }).submitKlaimPersalinan(formData); 
    }

    function processSubmitKlaimKB(e) {

        const formData = {

function openPrintMenu() {
    // 1. Mencegah fungsi bawaan browser (jika ada)
    if (event) {
        event.preventDefault();
        event.stopPropagation();
    }

    Swal.fire({
        title: 'Mempersiapkan PDF...',
        text: 'File akan terunduh otomatis secara langsung.',
        icon: 'info',
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    // 2. Memanggil fungsi di Main.gs
    google.script.run
        .withSuccessHandler(function(response) {
            Swal.close();
            if (response.status === 'success') {
                // Logika Download File tanpa Preview
                const byteCharacters = atob(response.base64Data);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], {type: 'application/pdf'});
                
                const fileURL = window.URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                downloadLink.href = fileURL;
                downloadLink.download = response.fileName || 'Laporan_Absensi_KOBE.pdf';
                
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                window.URL.revokeObjectURL(fileURL);

                Swal.fire({
                    icon: 'success',
                    title: 'Berhasil diunduh',
                    timer: 2000,
                    showConfirmButton: false
                });
            } else {
                Swal.fire('Gagal', response.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            Swal.close();
            Swal.fire('Error Server', 'Pastikan fungsi generateAbsensiPDF ada di Main.gs', 'error');
        })
        .generateAbsensiPDF();
}

        if(!sumber) return Swal.fire('Peringatan','Pilih sumber data','warning');

// Fungsi Eksekusi Simpan dari Tombol Tabel
function simpanBarisAbsensi(nrpp, nama, rowIndex) {
    const tgl = $('#eaTgl').val();
    const jamMasuk = $(`#in-jm-${nrpp}`).val();
    const jamKeluar = $(`#in-jk-${nrpp}`).val();
    const status = $(`#in-st-${nrpp}`).val();
    
    // Ubah ikon tombol jadi loading
    const btn = $(`#row-${nrpp} button`);
    const btnHtmlLama = btn.html();
    btn.html('<i class="fas fa-spinner fa-spin"></i>').prop('disabled', true);

    google.script.run.withSuccessHandler(function(resJSON) {
        const res = JSON.parse(resJSON);
        if(res.status === 'success') {
            // Animasi hijau sebentar pada baris untuk menandakan sukses
            $(`#row-${nrpp}`).addClass('table-success');
            setTimeout(() => { $(`#row-${nrpp}`).removeClass('table-success'); }, 1500);
            
            // Kembalikan ikon tombol
            btn.html('<i class="fas fa-check"></i>').removeClass('btn-success').addClass('btn-secondary');
            setTimeout(() => { btn.html(btnHtmlLama).removeClass('btn-secondary').addClass('btn-success').prop('disabled', false); }, 2000);
        } else {
            Swal.fire('Gagal Menyimpan', res.message, 'error');
            btn.html(btnHtmlLama).prop('disabled', false);
        }
    }).withFailureHandler(function(err) {
        Swal.fire('Error Koneksi', 'Gagal menyimpan ke server', 'error');
        btn.html(btnHtmlLama).prop('disabled', false);
    }).saveSingleAbsensi(nrpp, nama, tgl, jamMasuk, jamKeluar, status, rowIndex);
}

// Fungsi ringan pencarian (search text pada tabel)
function filterTabel(inputId, tableId) {
    var input, filter, table, tr, td, i, j, txtValue;
    input = document.getElementById(inputId);
    filter = input.value.toUpperCase();
    table = document.getElementById(tableId);
    tr = table.getElementsByTagName("tr");

    // Mulai dari i=1 agar thead tidak ikut terfilter
    for (i = 1; i < tr.length; i++) {
        tr[i].style.display = "none";
        td = tr[i].getElementsByTagName("td");
        for (j = 0; j < td.length; j++) {
            if (td[j]) {
                txtValue = td[j].textContent || td[j].innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                    break;
                }
            }
        }
    }
}

                return;

            // ==========================================
            // RENDER HEADER TABEL
            // ==========================================
            // Baris 1: No, NRPP, Nama (Latar Gelap) + Tanggal (Latar Terang) + REKAPITULASI (Latar Gelap)
            let headRow1 = `<tr class="text-center align-middle" style="font-size: 0.85rem;">
                                <th rowspan="2" style="background-color: #212529 !important; color: white !important; width: 40px; border: 1px solid #dee2e6;">No</th>
                                <th rowspan="2" style="background-color: #212529 !important; color: white !important; width: 90px; border: 1px solid #dee2e6;">NRPP</th>
                                <th rowspan="2" style="background-color: #212529 !important; color: white !important; width: 180px; border: 1px solid #dee2e6;">Nama</th>`;
            
            // Baris 2: IN, OUT, Status + Header Rekapitulasi (Semua Latar Terang)
            let headRow2 = `<tr class="text-center align-middle" style="font-size: 0.8rem; background-color: #ffffff;">`;
            
            // Render Header Kolom Tanggal
            res.dates.forEach(d => { 
                headRow1 += `<th colspan="3" style="background-color: #ffffff !important; color: #000000 !important; border: 1px solid #dee2e6;">${d.display}</th>`; 
                headRow2 += `<th style="border: 1px solid #dee2e6;">IN</th><th style="border: 1px solid #dee2e6;">OUT</th><th style="border: 1px solid #dee2e6;">Status</th>`; 
            });

            // Lanjutan Baris 1: Header REKAPITULASI
            headRow1 += `<th colspan="8" style="background-color: #212529 !important; color: white !important; border: 1px solid #dee2e6;">REKAPITULASI</th></tr>`;
            
            // Lanjutan Baris 2: Sub-Header Rekapitulasi
            const cellStyle = `style="background-color: #ffffff; color: #000000; font-weight: bold; border: 1px solid #dee2e6;"`;
            headRow2 += `<th ${cellStyle}>Late</th><th ${cellStyle}>Sakit</th>
                         <th ${cellStyle}>Cuti</th><th ${cellStyle}>ST</th>
                         <th ${cellStyle}>VC</th><th ${cellStyle}>PG</th>
                         <th ${cellStyle}>Jml Hadir</th><th ${cellStyle}>Hari Kerja</th></tr>`;
            
            thead.innerHTML = headRow1 + headRow2;
            tbody.innerHTML = ''; 
            
            let no = 1; 
            let workdays = res.workdays;

            // ==========================================
            // RENDER BODY TABEL (DATA KARYAWAN)
            // ==========================================
            res.employees.forEach(emp => {
                let tr = `<tr class="text-center align-middle" style="font-size: 0.8rem; background-color: #ffffff;">
                            <td style="border: 1px solid #dee2e6;">${no++}</td>
                            <td style="border: 1px solid #dee2e6;">${emp.nrpp}</td>
                            <td class="text-start text-nowrap" style="border: 1px solid #dee2e6;">${emp.nama}</td>`;
                
                let attData = res.attendance[emp.nrpp] || {};
                
                // Looping Kehadiran Harian
                res.dates.forEach(d => {
                     let att = attData[d.raw];
                     if(att) { 
                          // Inject warna latar belakang status dari fungsi getBgStatusStyle()
                          tr += `<td style="border: 1px solid #dee2e6;">${att.in}</td>
                                 <td style="border: 1px solid #dee2e6;">${att.out}</td>
                                 <td style="border: 1px solid #dee2e6; ${getBgStatusStyle(att.stat)}">${att.stat}</td>`; 
                     } else if (d.isLibur) { 
                          tr += `<td style="border: 1px solid #dee2e6;">-</td>
                                 <td style="border: 1px solid #dee2e6;">-</td>
                                 <td style="border: 1px solid #dee2e6; background-color: #e9ecef; color: red; font-weight: bold;">${d.liburStat}</td>`;
                     } else { 
                          tr += `<td style="border: 1px solid #dee2e6;">-</td>
                                 <td style="border: 1px solid #dee2e6;">-</td>
                                 <td style="border: 1px solid #dee2e6;">-</td>`; 
                     }
                });

                // Set warna spesifik untuk kolom rekapitulasi (Sesuai gambar)
                let lateColor = emp.lateStr !== "00:00:00" ? "color: #dc3545; font-weight: bold;" : "color: #6c757d;"; // Merah jika telat, abu-abu jika 0
                let pgColor = "color: #dc3545; font-weight: bold;"; // Merah
                let hadirColor = "color: #198754; font-weight: bold;"; // Hijau
                let kerjaColor = "color: #0d6efd; font-weight: bold;"; // Biru
                let boldBlack = "color: #000000; font-weight: bold;"; // Hitam Tebal

                tr += `<td style="border: 1px solid #dee2e6; ${lateColor}">${emp.lateStr}</td>
                       <td style="border: 1px solid #dee2e6; ${boldBlack}">${emp.S}</td>
                       <td style="border: 1px solid #dee2e6; ${boldBlack}">${emp.C}</td>
                       <td style="border: 1px solid #dee2e6; ${boldBlack}">${emp.ST}</td>
                       <td style="border: 1px solid #dee2e6; ${boldBlack}">${emp.VC}</td>
                       <td style="border: 1px solid #dee2e6; ${pgColor}">${emp.PG}</td>
                       <td style="border: 1px solid #dee2e6; ${hadirColor}">${emp.H}</td>
                       <td style="border: 1px solid #dee2e6; ${kerjaColor}">${workdays}</td></tr>`;
                
                tbody.insertAdjacentHTML('beforeend', tr);
            });

        }).getCrosstabRekapData(start, end, pt);
}

// Fungsi untuk memuat data Dashboard Absensi (Dengan Fallback System)
function loadAbsensiData() {
    $('#tbodyAbsensi').html('<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary spinner-border-sm me-2"></div> Menarik data dari server...</td></tr>');
    
    google.script.run.withSuccessHandler(function(responseJSON) {
        const res = JSON.parse(responseJSON);
        
        if (res.status === 'success') {
            $('#absensi-stat-hadir').text(res.stats.hadir);
            $('#absensi-stat-cuti').text(res.stats.cuti);
            $('#absensi-stat-izin').text(res.stats.izin);
            $('#absensi-stat-late').text(res.stats.terlambat);
            
            const tbody = $('#tbodyAbsensi').empty();
            
            if (res.logs.length === 0) {
                tbody.append('<tr><td colspan="6" class="text-center text-muted py-4">Database masih kosong.</td></tr>');
            } else {
                // Tampilkan Peringatan Jika Menggunakan Data Fallback (Bukan Hari Ini)
                if (res.fallbackMode) {
                    $('#tableAbsensi').before('<div class="alert alert-warning py-2 small fw-bold mb-2"><i class="fas fa-exclamation-triangle me-2"></i> PERINGATAN: Tidak ada data absensi yang tanggalnya cocok dengan "Hari Ini". Menampilkan 5 data terakhir dari sheet sebagai referensi.</div>');
                } else {
                    // Hapus alert jika sukses dapat data hari ini
                    $('.alert-warning').remove(); 
                }

                res.logs.forEach(function(log) {
                    let badgeClass = 'bg-secondary';
                    if(log.Status.toLowerCase().includes('hadir')) badgeClass = 'bg-primary';
                    else if(log.Status.toLowerCase().includes('cuti')) badgeClass = 'bg-warning text-dark';
                    else if(log.Status.toLowerCase().includes('sakit') || log.Status.toLowerCase().includes('izin')) badgeClass = 'bg-danger';
                    
                    // Jika fallback, kita selipkan tanggal aslinya di samping nama agar kamu tahu format yang terbaca
                    let tglInfo = res.fallbackMode ? `<br><small class="text-danger">${log.TglAsli}</small>` : '';

                    let tr = `<tr>
                        <td class="fw-bold">${log.NRPP}</td>
                        <td>${log.Nama} ${tglInfo}</td>
                        <td class="${log.Keterangan === 'Terlambat' ? 'text-danger fw-bold' : ''}">${log.JamMasuk}</td>
                        <td>${log.JamKeluar}</td>
                        <td><span class="badge ${badgeClass}">${log.Status}</span></td>
                        <td>${log.Keterangan}</td>
                    </tr>`;
                    tbody.append(tr);
                });
            }
        } else {
            Swal.fire('Gagal', res.message, 'error');
            $('#tbodyAbsensi').html(`<tr><td colspan="6" class="text-center text-danger py-4">Error: ${res.message}</td></tr>`);
        }
    }).withFailureHandler(function(error) {
        Swal.fire('Koneksi Terputus', 'Gagal memanggil fungsi server.', 'error');
    }).getDashboardAbsensiData();
}

function loadDatalistKaryawan() {

            if (!datalist) {
                datalist = document.createElement('datalist');
                datalist.id = 'listKaryawanSingle';
                document.body.appendChild(datalist);
            }
            
            datalist.innerHTML = "";

// 2. FUNGSI PRATINJAU DATA (ANTI SILENT ERROR & AUTO SCROLL)
// =========================================================
function loadLaporan() {
    const pt = document.getElementById('lapPerusahaan').value;
    const rawKar = document.getElementById('lapKaryawan').value; 
    const start = document.getElementById('lapStart').value;
    const end = document.getElementById('lapEnd').value;

    if (!pt || !rawKar || !start || !end) {
        Swal.fire('Peringatan', 'Harap isi semua filter pencarian!', 'warning');
        return;
    }

    // Memotong string "NRPP - NAMA" menjadi "NRPP"
    const kar = rawKar.split(' - ')[0].trim(); 

    Swal.fire({
        title: 'Menarik Data...',
        text: 'Mengumpulkan rincian absensi karyawan',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    google.script.run
        .withFailureHandler(function(err) {
            Swal.fire('Error Server', err.message, 'error');
        })
        .withSuccessHandler(function(res) {
            console.log("DATA SERVER:", res); // Memastikan data masuk

            if (res.status === 'error') {
                Swal.fire('Data Gagal', res.message, 'error');
                return;
            }

            // MENGGUNAKAN TRY-CATCH UNTUK MENDETEKSI SILENT ERROR HTML
            try {
                // 1. TAMPILKAN AREA PRINT (Paksa tampil dengan JS dan jQuery)
                const printArea = document.getElementById('printArea');
                if(printArea) {
                    printArea.classList.remove('d-none');
                    printArea.style.display = 'block';
                } else {
                    throw new Error("Elemen dengan ID 'printArea' tidak ditemukan di HTML!");
                }

                document.getElementById('kopPerusahaan').innerText = res.profile.perusahaan || (pt === "KOBE" ? "PT. KOBEXINDO TRACTORS TBK" : "PT. KOBEXINDO EQUIPMENT");
                
                // 2. MAPPING IDENTITAS
                document.getElementById('lblNRPP').innerText = res.profile.nrpp || "-";
                document.getElementById('lblNama').innerText = res.profile.nama || "-";
                document.getElementById('lblGol').innerText = res.profile.gol || "-";
                document.getElementById('lblStatus').innerText = res.profile.status || "-";
                document.getElementById('lblJabatan').innerText = res.profile.jabatan || "-";
                document.getElementById('lblDept').innerText = res.profile.dept || "-";
                document.getElementById('lblDivisi').innerText = res.profile.divisi || "-";
                document.getElementById('lblPeriode').innerText = `${start} s/d ${end}`;

                // 3. MAPPING REKAPITULASI BAWAH
                document.getElementById('lblTotHadir').innerText = res.rekap.H || "0";
                document.getElementById('lblTotSakit').innerText = res.rekap.S || "0";
                document.getElementById('lblTotCuti').innerText = res.rekap.C || "0";
                document.getElementById('lblTotST').innerText = res.rekap.ST || "0";
                document.getElementById('lblTotPG').innerText = res.rekap.PG || "0";
                document.getElementById('lblTotVisit').innerText = res.rekap.VC || "0";
                document.getElementById('lblTotKerja').innerText = res.rekap.HariKerja || "0";

                // 4. MAPPING ISI TABEL
                const tbody = document.querySelector('#tabelLaporan tbody');
                if (!tbody) throw new Error("Tag <tbody> di dalam '#tabelLaporan' tidak ditemukan!");
                
                tbody.innerHTML = '';
                
                res.matrix.forEach(r => {
                    let trClass = r.hari === 'Minggu' ? 'bg-light text-danger' : '';
                    let telatClass = r.telat !== "-" ? 'text-danger fw-bold' : '';
                    
                    let tr = `<tr class="${trClass}">
                        <td>${r.no}</td>
                        <td>${r.hari}</td>
                        <td>${r.tanggal}</td>
                        <td>${r.jamIn}</td>
                        <td>${r.jamOut}</td>
                        <td class="${telatClass}">${r.telat}</td>
                        <td class="fw-bold">${r.stat}</td>
                        <td>${r.durasi}</td>
                    </tr>`;
                    tbody.insertAdjacentHTML('beforeend', tr);
                });

                Swal.close(); 

                // 5. ANIMASI SCROLL OTOMATIS KE AREA TABEL
                $('html, body').animate({
                    scrollTop: $("#printArea").offset().top - 20
                }, 500);

            } catch (renderError) {
                console.error("ERROR TAMPILAN:", renderError);
                Swal.fire({
                    icon: 'error',
                    title: 'HTML Tidak Sinkron',
                    text: 'Gagal memasukkan data. Silakan cek Konsol (F12) untuk melihat ID apa yang hilang: ' + renderError.message
                });
            }

        }).getLaporanKaryawanData(kar, start, end, pt); 
}

        ws_data.push(["HADIR (H)", "SAKIT (S)", "CUTI (C)", "ST", "PG / ALPA", "VISIT CUST", "HARI KERJA"]); 
        ws_data.push([
            document.getElementById('lblTotHadir').innerText,
            document.getElementById('lblTotSakit').innerText,
            document.getElementById('lblTotCuti').innerText,
            document.getElementById('lblTotST').innerText,
            document.getElementById('lblTotPG').innerText,
            document.getElementById('lblTotVisit').innerText,
            document.getElementById('lblTotKerja').innerText
        ]);

        let wb = XLSX.utils.book_new();
        let ws = XLSX.utils.aoa_to_sheet(ws_data);

        ws['!cols'] = [
            { wch: 5 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, 
            { wch: 15 }, { wch: 18 }, { wch: 10 }, { wch: 20 }  
        ];

        if(!ws["!merges"]) ws["!merges"] = [];
        ws["!merges"].push({s: {r:0, c:0}, e: {r:0, c:7}}); 
        ws["!merges"].push({s: {r:1, c:0}, e: {r:1, c:7}}); 

        XLSX.utils.book_append_sheet(wb, ws, "Laporan");

        let safePeriode = periode.replace(/ \/ /g, "_").replace(/ s\/d /g, "_");
        let fileName = `Laporan_Kehadiran_${nama}_${safePeriode}.xlsx`;
        XLSX.writeFile(wb, fileName);

        Swal.close(); 

    } catch (error) {
        Swal.fire('Error', 'Terjadi kesalahan saat mengekspor ke Excel: ' + error.message, 'error');
    }
}
// =========================================================
// 4. FUNGSI DOWNLOAD PDF (MENGGUNAKAN HTML2PDF) - ANTI BLANK
// =========================================================
function downloadLaporanPDF() {
    const nrpp = document.getElementById('lblNRPP').innerText;
    const nama = document.getElementById('lblNama').innerText;
    const periode = document.getElementById('lblPeriode').innerText;
    
    // Validasi: Cegah cetak jika data belum ditampilkan
    if (!nrpp || nrpp === "-") {
        Swal.fire('Peringatan', 'Silakan tampilkan data (Pratinjau) terlebih dahulu sebelum mengunduh PDF.', 'warning');
        return;
    }

    Swal.fire({
        title: 'Menyiapkan PDF...',
        text: 'Sedang "memotret" laporan ke format PDF (Mohon tunggu sebentar)',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    // 1. Pilih elemen HTML yang akan diubah menjadi PDF
    const printArea = document.getElementById('printArea');
    
    // 2. Sembunyikan tombol Excel & PDF sementara agar tidak ikut tercetak di dalam PDF
    const tombolAction = printArea.querySelector('.no-print');
    if (tombolAction) tombolAction.style.display = 'none';

    // 3. Buat nama file yang rapi secara otomatis
    let safePeriode = periode.replace(/ \/ /g, "_").replace(/ s\/d /g, "_");
    let fileName = `Laporan_Kehadiran_${nama}_${safePeriode}.pdf`;

    // 4. Pengaturan kualitas dan ukuran kertas PDF
    const opt = {
        margin:       5, // Margin tepi kertas (5mm)
        filename:     fileName,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true }, // Scale 2 agar teks tajam (HD) dan tidak pecah
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // 5. Eksekusi pembuatan PDF
    html2pdf().set(opt).from(printArea).save().then(() => {
        // Kembalikan tombol Excel & PDF agar muncul lagi di layar
        if (tombolAction) tombolAction.style.display = '';
        Swal.fire('Sukses', 'File PDF berhasil diunduh!', 'success');
    }).catch(err => {
        // Jika terjadi error
        if (tombolAction) tombolAction.style.display = '';
        Swal.fire('Error', 'Gagal membuat PDF: ' + err.message, 'error');
    });
}
