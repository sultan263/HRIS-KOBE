<div class="login-wrapper-new fade-in">
    <div class="login-split-card shadow-lg">
        
        <div class="login-left">
            <div class="login-overlay"></div>
            <div class="login-left-content">
                <i class="fa-solid fa-users-gear text-emerald mb-3" style="font-size: 3.5rem; text-shadow: 0 4px 15px rgba(16,185,129,0.5);"></i>
                <h2 class="fw-bold text-white mb-2" style="letter-spacing: 1px;">HUMAN RESEARCH DEVELOPMENT</h2>
                <p class="text-white-50 slogan">"Inovasi Tanpa Batas"</p>
            </div>
        </div>

        <div class="login-right">
            <div class="login-right-inner w-100">
                <div class="text-center mb-5">
                    <h4 class="fw-bold" style="color: var(--primary-color);">Masuk Sistem</h4>
                    <p class="text-muted small">Silakan masukkan kredensial Anda</p>
                </div>
                
                <form id="loginForm" onsubmit="processLogin(event)">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">Username</label>
                        <div class="input-group elegant-input-group-dark">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="login-username" required placeholder="Ketik username Anda">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small">Password</label>
                        <div class="input-group elegant-input-group-dark">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-key text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="login-password" required placeholder="Ketik password Anda">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-emerald w-100 fw-bold py-2 shadow-sm mt-2">
                        LOGIN <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="login-footer text-center text-muted fade-in" style="margin-top: 50px;">
                    <p class="mb-0 fw-bold" style="font-size: 0.8rem; color: #64748b;">@Develop by Nuryadi</p>
                    <p class="small" style="font-size: 0.7rem; color: #94a3b8;">KOBE Industries | Enterprise Edition</p>
                </div>
            </div>
        </div>
        
    </div>
</div>
